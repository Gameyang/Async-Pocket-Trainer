<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Pocket Logue Sandbox</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #17202a;
        --panel: #f8f1dc;
        --panel-deep: #d4b96f;
        --line: #1f2933;
        --muted: #687386;
        --sky-a: #8bd8ff;
        --sky-b: #ffe189;
        --grass: #58b368;
        --grass-deep: #2f7e54;
        --water: #4ca7c9;
        --red: #e25248;
        --gold: #f6c453;
        --green: #4fc46b;
        --blue: #557eea;
        --violet: #7954c8;
        --shadow: rgba(18, 24, 32, 0.24);
        --pixel-font:
          "DungGeunMo", "Galmuri11", "Galmuri9", "GalmuriMono11", "NeoDunggeunmo",
          "NeoDunggeunmo Pro", "D2Coding", "Nanum Gothic Coding", "Apple SD Gothic Neo",
          "Malgun Gothic", "Noto Sans KR", "Trebuchet MS", "Verdana", "Arial", system-ui,
          -apple-system, BlinkMacSystemFont, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        min-height: 100dvh;
        padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right))
          max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
        overflow-x: hidden;
        color: var(--ink);
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.08) 25%, transparent 25%) 0 0 / 12px 12px,
          linear-gradient(315deg, rgba(255, 255, 255, 0.06) 25%, transparent 25%) 0 0 / 12px 12px,
          #182338;
        font-family: var(--pixel-font);
        font-synthesis-weight: none;
        text-rendering: geometricPrecision;
        word-break: keep-all;
      }

      button {
        min-height: 44px;
        border: 0;
        color: inherit;
        font: inherit;
      }

      .device {
        width: min(100%, 430px);
        min-height: min(100dvh - 24px, 860px);
        display: grid;
        grid-template-rows: auto minmax(300px, 1fr) auto;
        gap: 10px;
        padding: 10px;
        border: 4px solid #101722;
        border-radius: 8px;
        background: #26384f;
        box-shadow:
          0 22px 60px rgba(0, 0, 0, 0.36),
          inset 0 0 0 3px rgba(255, 255, 255, 0.12);
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
        padding: 8px;
        border: 3px solid var(--line);
        border-radius: 6px;
        background: linear-gradient(180deg, #fff7d9, #e9d188);
        box-shadow: inset 0 -4px 0 rgba(66, 52, 26, 0.16);
      }

      .brand {
        display: flex;
        align-items: center;
        min-width: 0;
        gap: 8px;
      }

      .mark {
        width: 28px;
        height: 28px;
        flex: 0 0 auto;
        border: 3px solid var(--line);
        border-radius: 50%;
        background:
          linear-gradient(#e94d4a 0 45%, var(--line) 45% 55%, #f7f7f2 55%),
          radial-gradient(circle at center, #f7f7f2 0 22%, var(--line) 23% 34%, transparent 35%);
        box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.18);
      }

      h1 {
        margin: 0;
        overflow: hidden;
        font-size: 1.12rem;
        line-height: 1;
        letter-spacing: 0;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .top-stats {
        display: flex;
        justify-content: flex-end;
        gap: 5px;
        min-width: 0;
        font-size: 0.68rem;
        font-weight: 800;
      }

      .pill {
        padding: 5px 7px;
        border: 2px solid var(--line);
        border-radius: 6px;
        background: #fffef4;
        box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.12);
        white-space: nowrap;
      }

      .screen {
        position: relative;
        overflow: hidden;
        min-height: 0;
        border: 4px solid #101722;
        border-radius: 8px;
        background: #77c7ef;
        box-shadow:
          inset 0 0 0 4px rgba(255, 255, 255, 0.14),
          inset 0 -12px 0 rgba(0, 0, 0, 0.14);
      }

      .battlefield {
        position: absolute;
        inset: 0;
        display: grid;
        grid-template-rows: 48% 52%;
        background:
          linear-gradient(180deg, var(--sky-a) 0 22%, var(--sky-b) 52%, #87ce75 52% 100%),
          repeating-linear-gradient(90deg, transparent 0 24px, rgba(255, 255, 255, 0.12) 24px 25px);
      }

      .battlefield::before {
        content: "";
        position: absolute;
        inset: auto -12% 30% -12%;
        height: 26%;
        background:
          linear-gradient(
              135deg,
              transparent 0 22%,
              rgba(70, 135, 89, 0.36) 22% 34%,
              transparent 34%
            )
            0 0 / 54px 38px,
          linear-gradient(180deg, rgba(255, 255, 255, 0.36), rgba(255, 255, 255, 0));
      }

      .battlefield::after {
        content: "";
        position: absolute;
        inset: 49% 0 0;
        background:
          radial-gradient(ellipse at 75% 28%, #79c06b 0 22%, transparent 23%),
          radial-gradient(ellipse at 22% 72%, #5ba060 0 27%, transparent 28%),
          repeating-linear-gradient(0deg, rgba(47, 126, 84, 0.22) 0 2px, transparent 2px 9px),
          linear-gradient(180deg, #75bb68, #4c9a5f);
      }

      .platform {
        position: absolute;
        width: 46%;
        aspect-ratio: 2.65 / 1;
        border: 3px solid rgba(35, 60, 39, 0.62);
        border-radius: 50%;
        background:
          radial-gradient(ellipse at center, rgba(255, 255, 255, 0.26), transparent 56%),
          repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.13) 0 2px, transparent 2px 7px),
          #70b865;
        box-shadow: 0 10px 0 rgba(30, 57, 39, 0.18);
      }

      .platform.enemy {
        top: 25%;
        right: 8%;
      }

      .platform.hero {
        bottom: 17%;
        left: 5%;
        width: 54%;
      }

      .monster {
        position: absolute;
        image-rendering: pixelated;
        filter: drop-shadow(0 7px 0 rgba(25, 38, 36, 0.22));
      }

      .monster svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      .enemy-mon {
        top: 10%;
        right: 12%;
        width: min(38%, 145px);
      }

      .hero-mon {
        bottom: 20%;
        left: 11%;
        width: min(42%, 166px);
      }

      .battle-card {
        position: absolute;
        display: grid;
        gap: 5px;
        min-width: 42%;
        padding: 7px 9px;
        border: 3px solid var(--line);
        border-radius: 6px;
        background: linear-gradient(180deg, #fffbe9, #eadb9e);
        box-shadow: 4px 5px 0 rgba(0, 0, 0, 0.18);
        font-weight: 800;
      }

      .battle-card.enemy {
        top: 10px;
        left: 9px;
      }

      .battle-card.hero {
        right: 9px;
        bottom: 110px;
      }

      .name-row {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        font-size: 0.78rem;
      }

      .bar {
        height: 10px;
        overflow: hidden;
        border: 2px solid var(--line);
        border-radius: 6px;
        background: #6b5e4b;
      }

      .bar span {
        display: block;
        height: 100%;
        border-right: 2px solid rgba(0, 0, 0, 0.18);
        background: linear-gradient(90deg, var(--green), #dbec5c);
      }

      .battle-card.hero .bar span {
        width: 72%;
      }

      .battle-card.enemy .bar span {
        width: 54%;
        background: linear-gradient(90deg, #f19f39, #f1db4b);
      }

      .log-panel {
        position: absolute;
        right: 8px;
        bottom: 8px;
        left: 8px;
        display: grid;
        gap: 5px;
        padding: 8px 10px;
        border: 3px solid var(--line);
        border-radius: 6px;
        background: linear-gradient(180deg, #fef9e6, #ddc989);
        box-shadow: inset 0 -4px 0 rgba(71, 55, 25, 0.12);
      }

      .log-line {
        margin: 0;
        font-size: clamp(0.75rem, 3.2vw, 0.92rem);
        font-weight: 800;
        line-height: 1.28;
      }

      .team-strip {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 4px;
      }

      .team-dot {
        height: 10px;
        border: 2px solid var(--line);
        border-radius: 5px;
        background: #fffdf0;
      }

      .team-dot:nth-child(-n + 4) {
        background: var(--green);
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .command-panel,
      .pad-panel {
        border: 3px solid var(--line);
        border-radius: 8px;
        background: linear-gradient(180deg, #fff4ce, #cda960);
        box-shadow: inset 0 -5px 0 rgba(0, 0, 0, 0.16);
      }

      .command-panel {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 7px;
        padding: 8px;
      }

      .cmd {
        border: 3px solid var(--line);
        border-radius: 6px;
        background: linear-gradient(180deg, #fffef5, #ead382);
        font-size: clamp(0.75rem, 3.2vw, 0.88rem);
        font-weight: 900;
        box-shadow: 0 4px 0 #6a5430;
      }

      .cmd:nth-child(1) {
        color: #8c1f1d;
      }

      .cmd:nth-child(2) {
        color: #705000;
      }

      .cmd:nth-child(3) {
        color: #1b6b43;
      }

      .cmd:nth-child(4) {
        color: #3452a5;
      }

      .pad-panel {
        display: grid;
        grid-template-columns: minmax(118px, 1fr) minmax(82px, 0.74fr);
        gap: 8px;
        align-items: center;
        padding: 8px;
      }

      .dpad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 1fr);
        gap: 4px;
        aspect-ratio: 1;
      }

      .dpad button,
      .round,
      .menu {
        border: 3px solid #0d1520;
        box-shadow: 0 4px 0 rgba(13, 21, 32, 0.88);
      }

      .dpad button {
        border-radius: 5px;
        background: linear-gradient(180deg, #344760, #182334);
        color: #eef4ff;
        font-size: 1rem;
        font-weight: 900;
      }

      .dpad .up {
        grid-column: 2;
        grid-row: 1;
      }

      .dpad .left {
        grid-column: 1;
        grid-row: 2;
      }

      .dpad .center {
        grid-column: 2;
        grid-row: 2;
        background: #243348;
      }

      .dpad .right {
        grid-column: 3;
        grid-row: 2;
      }

      .dpad .down {
        grid-column: 2;
        grid-row: 3;
      }

      .action-stack {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 7px;
      }

      .round {
        aspect-ratio: 1;
        border-radius: 50%;
        color: #fffef4;
        font-weight: 900;
      }

      .round.a {
        background: linear-gradient(180deg, #f27060, #be342e);
      }

      .round.b {
        background: linear-gradient(180deg, #6ca1ff, #3558bf);
      }

      .menu {
        grid-column: 1 / -1;
        min-height: 36px;
        border-radius: 6px;
        background: linear-gradient(180deg, #fffdf0, #d7c070);
        font-size: 0.7rem;
        font-weight: 900;
      }

      .scanlines {
        pointer-events: none;
        position: absolute;
        inset: 0;
        opacity: 0.08;
        background: repeating-linear-gradient(0deg, #000 0 1px, transparent 1px 4px);
        mix-blend-mode: multiply;
      }

      @media (max-width: 380px) {
        .device {
          gap: 8px;
          padding: 8px;
        }

        .topbar,
        .controls {
          gap: 7px;
        }

        .controls {
          grid-template-columns: 1fr;
        }

        .pad-panel {
          grid-template-columns: minmax(132px, 1fr) minmax(92px, 0.75fr);
        }

        .battle-card {
          min-width: 50%;
        }

        .battle-card.hero {
          bottom: 118px;
        }
      }

      @media (min-width: 700px) {
        body {
          padding: 24px;
        }

        .device {
          min-height: 820px;
        }
      }
    </style>
  </head>
  <body>
    <main class="device" aria-label="Pocket Logue sandbox">
      <header class="topbar">
        <div class="brand">
          <span class="mark" aria-hidden="true"></span>
          <h1>Pocket Logue</h1>
        </div>
        <div class="top-stats" aria-label="run status">
          <span class="pill">W 12</span>
          <span class="pill">$ 840</span>
          <span class="pill">6/6</span>
        </div>
      </header>

      <section class="screen" aria-label="battle screen">
        <div class="battlefield" aria-hidden="true"></div>
        <div class="platform enemy" aria-hidden="true"></div>
        <div class="platform hero" aria-hidden="true"></div>

        <div class="monster enemy-mon" aria-hidden="true">
          <svg viewBox="0 0 120 110" role="img">
            <path
              d="M31 42h11V30h13V18h25v12h12v24h10v23H90v12H65v10H43V87H28V74H18V53h13z"
              fill="#8161cb"
            />
            <path d="M43 18h12v12H43zM80 30h12v12H80zM28 53h14v12H28z" fill="#b68cff" />
            <path d="M55 42h10v10H55zM80 42h9v10h-9z" fill="#fff6d9" />
            <path d="M58 45h5v5h-5zM83 45h4v5h-4z" fill="#17202a" />
            <path d="M48 68h37v6H48z" fill="#4d338a" />
            <path d="M18 77h16v12H18zM92 75h18v12H92z" fill="#5f44a3" />
          </svg>
        </div>

        <div class="monster hero-mon" aria-hidden="true">
          <svg viewBox="0 0 132 112" role="img">
            <path d="M42 72H28V56h10V40h14V28h29v11h16v17h10v24H94v13H67v10H42z" fill="#48a7c5" />
            <path d="M52 28h29v11H52zM38 40h14v16H38zM80 39h17v17H80z" fill="#78d8e8" />
            <path d="M33 73h16v18H33zM89 78h22v14H89z" fill="#2d789a" />
            <path d="M60 50h9v9h-9zM86 51h8v8h-8z" fill="#fff6d9" />
            <path d="M63 53h4v4h-4zM88 53h4v4h-4z" fill="#17202a" />
            <path d="M62 74h32v6H62z" fill="#1e5d7a" />
            <path d="M17 48h13v13H17zM12 36h10v12H12z" fill="#f6c453" />
          </svg>
        </div>

        <aside class="battle-card enemy" aria-label="enemy status">
          <div class="name-row">
            <span>WRAITH</span>
            <span>Lv 18</span>
          </div>
          <div class="bar"><span></span></div>
        </aside>

        <aside class="battle-card hero" aria-label="ally status">
          <div class="name-row">
            <span>AQUA</span>
            <span>Lv 21</span>
          </div>
          <div class="bar"><span></span></div>
        </aside>

        <div class="log-panel" aria-label="battle log">
          <p class="log-line">AQUA is waiting for a command.</p>
          <div class="team-strip" aria-hidden="true">
            <span class="team-dot"></span>
            <span class="team-dot"></span>
            <span class="team-dot"></span>
            <span class="team-dot"></span>
            <span class="team-dot"></span>
            <span class="team-dot"></span>
          </div>
        </div>
        <div class="scanlines" aria-hidden="true"></div>
      </section>

      <section class="controls" aria-label="battle controls">
        <div class="command-panel" aria-label="command menu">
          <button class="cmd" type="button">FIGHT</button>
          <button class="cmd" type="button">BAG</button>
          <button class="cmd" type="button">TEAM</button>
          <button class="cmd" type="button">RUN</button>
        </div>

        <div class="pad-panel" aria-label="touch controls">
          <div class="dpad" aria-label="direction pad">
            <button class="up" type="button" aria-label="up">&uarr;</button>
            <button class="left" type="button" aria-label="left">&larr;</button>
            <button class="center" type="button" aria-label="center"></button>
            <button class="right" type="button" aria-label="right">&rarr;</button>
            <button class="down" type="button" aria-label="down">&darr;</button>
          </div>
          <div class="action-stack" aria-label="action buttons">
            <button class="round b" type="button">B</button>
            <button class="round a" type="button">A</button>
            <button class="menu" type="button">MENU</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
