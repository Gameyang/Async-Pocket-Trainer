name: 기능 제안
description: 새 기능, 게임 규칙, 개발 하네스 개선을 제안합니다.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: goal
    attributes:
      label: 목표
      description: 이 기능이 해결해야 하는 문제나 플레이 경험을 적어주세요.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안
      description: 가능한 구현 방향이나 UX를 적어주세요.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 완료 기준
      description: PR이 끝났다고 판단할 수 있는 기준을 체크리스트로 적어주세요.
      placeholder: |
        - [ ] 
        - [ ]
    validations:
      required: true
