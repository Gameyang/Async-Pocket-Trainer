name: 버그 리포트
description: 재현 가능한 문제를 기록합니다.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 문제 요약
      description: 어떤 문제가 발생했는지 간단히 적어주세요.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 절차
      description: 문제를 재현하는 순서를 적어주세요.
      placeholder: |
        1. 
        2. 
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 결과
      description: 원래 기대한 동작을 적어주세요.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 실제 결과
      description: 실제로 발생한 동작을 적어주세요.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 환경
      placeholder: "예: Windows 11, Chrome 124"
