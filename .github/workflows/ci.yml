name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      headless_profile:
        description: Optional long-running headless QA profile
        required: true
        type: choice
        default: none
        options:
          - none
          - wave30
          - wave50
          - wave100

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality gate
        run: npm run verify

      - name: Run 30-wave headless profile
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.headless_profile == 'wave30' }}
        run: npm run qa:headless:30

      - name: Run 50-wave headless profile
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.headless_profile == 'wave50' }}
        run: npm run qa:headless:50

      - name: Run 100-wave headless profile
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.headless_profile == 'wave100' }}
        run: npm run qa:headless:100
